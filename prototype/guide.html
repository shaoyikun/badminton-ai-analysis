<!doctype html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>移动端原型-拍摄规范</title><link rel='stylesheet' href='styles.css'></head><body><div class='mobile-shell'><div class='topbar'><div class='title'>拍摄规范</div><div class='sub'>移动端原型 · 上传前必看</div></div><main class='page'><section class='card'><span class='badge'>上传前必看</span><h3>推荐拍摄要求</h3><div class='list'><div class='item'>单人出镜，避免其他人频繁进入画面</div><div class='item'>时长 5~15 秒</div><div class='item'>优先侧后方 / 正后方机位</div><div class='item'>人物尽量全身完整入镜</div><div class='item'>一段视频只分析一种动作</div><div class='item'>避免逆光、遮挡和剧烈抖动</div></div></section><section class='card'><h3>动作专项提醒</h3><div class='list'><div class='item'><strong>正手高远球</strong><p class='muted'>优先保证引拍、击球、收拍和回位全过程都能看到。</p></div><div class='item'><strong>杀球</strong><p class='muted'>优先保证高点准备、身体联动和击球后的整体平衡。</p></div></div></section><section class='card'><h3>常见错误</h3><div class='list'><div class='item'><strong>人物太小</strong><p class='muted'>看不清关节和挥拍细节</p></div><div class='item'><strong>多人同框</strong><p class='muted'>主体不明确，容易识别失败</p></div><div class='item'><strong>视频太短</strong><p class='muted'>没有完整覆盖准备、击球、收拍</p></div></div></section><div class='alert'>建议先按规范拍好再上传，MVP 阶段识别效果高度依赖输入视频质量。</div><section class='actions'><button class='btn' data-go='upload.html'>我已了解，去上传</button><button class='btn-secondary' data-go='index.html'>返回首页</button></section></main><nav class='bottom-nav'><a href='index.html' data-tab>首页</a><a href='upload.html' data-tab>上传</a><a href='report.html' data-tab>报告</a><a href='history.html' data-tab>记录</a></nav></div><script src='app.js'></script></body></html>
