<!doctype html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>移动端原型-上传</title><link rel='stylesheet' href='styles.css'></head><body><div class='mobile-shell'><div class='topbar'><div class='title'>上传视频</div><div class='sub'>移动端原型 · 单动作分析</div></div><main class='page'><section class='card'><h3>选择动作类型</h3><div class='pills'><div class='pill active'>正手高远球</div><div class='pill'>杀球</div></div><p class='muted space-top'>切换动作后，当前视频会被清空并需要重新选择。</p></section><section class='card'><h3>上传视频</h3><div class='upload-box'><strong>点击上传视频</strong><p class='muted'>建议 5~15 秒，mp4 / mov，单人固定机位</p></div><div class='list space-top'><div class='item'>文件名：clear-demo.mov</div><div class='item'>大小：10.4 MB</div><div class='item'>时长：8 秒</div></div></section><section class='card'><h3>上传前确认</h3><div class='list'><div class='item'>动作：正手高远球</div><div class='item'>机位：侧后方 / 正后方更稳定</div><div class='item'>目标：开始分析后会直接进入分析中</div></div></section><div class='alert'>未选择文件时，点击“开始分析”仅做页内提示；只有服务端返回明确错误才进入错误页。</div><section class='actions'><button class='btn' data-go='processing.html'>开始分析</button><button class='btn-secondary' data-go='guide.html'>查看拍摄规范</button></section></main><nav class='bottom-nav'><a href='index.html' data-tab>首页</a><a href='upload.html' data-tab>上传</a><a href='report.html' data-tab>报告</a><a href='history.html' data-tab>记录</a></nav></div><script src='app.js'></script></body></html>
