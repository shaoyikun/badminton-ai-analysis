<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>羽毛球 AI 动作分析 Demo</title>
    <link rel="stylesheet" href="src/demo/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">Badminton AI Demo</p>
          <h1>羽毛球动作分析与训练建议</h1>
          <p class="subtitle">上传一段羽毛球动作视频，生成模拟分析报告，先把产品体验跑起来。</p>
        </div>
        <div class="hero-card">
          <div class="stat"><span>支持动作</span><strong>高远球 / 杀球</strong></div>
          <div class="stat"><span>分析模式</span><strong>Demo 模拟分析</strong></div>
          <div class="stat"><span>目标</span><strong>验证产品体验</strong></div>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>1. 上传与分析</h2>
          <label class="label">动作类型</label>
          <div class="actions">
            <button class="action-btn active" data-action="clear">正手高远球</button>
            <button class="action-btn" data-action="smash">杀球</button>
          </div>

          <label class="label">上传视频</label>
          <input id="videoInput" type="file" accept="video/*" />
          <p class="hint">建议上传 5~15 秒、单人、侧后方或正后方机位的视频。</p>

          <div id="previewWrap" class="preview hidden">
            <video id="videoPreview" controls></video>
            <div class="meta" id="videoMeta"></div>
          </div>

          <div class="cta-group">
            <button id="analyzeBtn" class="primary">开始分析</button>
            <button id="sampleBtn" class="secondary">直接查看示例报告</button>
          </div>

          <div id="loadingCard" class="loading hidden">
            <div class="spinner"></div>
            <div>
              <strong>分析中...</strong>
              <p id="loadingText">正在提取关键帧与动作特征</p>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>2. 分析报告</h2>
          <div id="emptyState" class="empty">
            上传视频并点击“开始分析”后，这里会生成一份可演示的动作报告。
          </div>
          <div id="report" class="report hidden"></div>
        </section>
      </main>
    </div>

    <script src="src/demo/app.js"></script>
  </body>
</html>
